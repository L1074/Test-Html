<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的简单网页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f5f5f5; padding: 40px; text-align: center; }
        .box { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 2px 10px #0000001a; }
        h1 { color: #333; margin-bottom: 20px; }
        p { color: #666; font-size: 18px; line-height: 1.6; margin-bottom: 30px; }
        a { color: #409eff; text-decoration: none; font-size: 18px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>你好，这是我的简单网页</h1>
        <p>这个网页是用AI快速生成的，已经可以分享给任何人访问啦！</p>
        <a href="https://www.baidu.com">点击跳转到百度</a>
    </div>
</body>
</html>
